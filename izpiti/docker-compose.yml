services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: izpiti
      POSTGRES_USER: izpiti
      POSTGRES_PASSWORD: izpiti
    ports:
      - "5434:5432"
    volumes:
      - izpiti_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U izpiti -d izpiti"]
      interval: 2s
      timeout: 5s
      retries: 15

  izpiti-grpc:
    build: .
    environment:
      DATABASE_URL: postgres://izpiti:izpiti@db:5432/izpiti
      GRPC_PORT: "50051"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "50051:50051"

volumes:
  izpiti_db:
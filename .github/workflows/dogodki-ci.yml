name: dogodki-ci

on:
  push:
    paths:
      - "dogodki/**"
      - ".github/workflows/dogodki-ci.yml"
  pull_request:
    paths:
      - "dogodki/**"
      - ".github/workflows/dogodki-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dogodki

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: mvn -q test
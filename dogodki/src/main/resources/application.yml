server:
  port: 8090

logging:
  level:
    root: INFO

spring:
  application:
    name: dogodki

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://root:root@localhost:27017/dogodki?authSource=admin}

  artemis:
    mode: native
    broker-url: ${ARTEMIS_URL:tcp://localhost:61616}
    user: ${ARTEMIS_USER:admin}
    password: ${ARTEMIS_PASSWORD:admin}

dogodki:
  queue: ${DOGODKI_QUEUE:events.v1}

springdoc:
  swagger-ui:
    path: /swagger-ui